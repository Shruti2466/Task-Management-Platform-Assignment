version: '3.8'

services:
  userservice:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  taskservice:
    build:
      context: .
      dockerfile: TaskService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  reportingservice:
    build:
      context: .
      dockerfile: ReportingService/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TaskService__BaseUrl=http://taskservice:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - userservice
      - taskservice
      - reportingservice
