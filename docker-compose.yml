version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Test_12345678
      MYSQL_DATABASE: taskmanagementdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  userservice:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=usersdb;Uid=root;Pwd=Test_12345678;
    depends_on:
      - db

  taskservice:
    build:
      context: .
      dockerfile: TaskService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=tasksdb;Uid=root;Pwd=Test_12345678;
    depends_on:
      - db

  reportingservice:
    build:
      context: .
      dockerfile: ReportingService/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TaskService__BaseUrl=http://taskservice:8080
    depends_on:
      - userservice
      - taskservice

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - userservice
      - taskservice
      - reportingservice

volumes:
  db_data:
